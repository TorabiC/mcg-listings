<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OM Digital Flip Book — The Enclave at Beaver Lake | Mason Capital Group</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900&display=swap" rel="stylesheet">
<style>
:root{--navy:#16162a;--crimson:#ab012e;--gold:#c4a35a;--white:#fff;--font:'Lato','Helvetica Neue',Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:var(--font);background:#0a0a18;overflow:hidden}
.app{width:100%;height:100%;display:flex;flex-direction:column;background:linear-gradient(160deg,#080816,#12122a 50%,#18102e);user-select:none}

.hd{height:40px;flex-shrink:0;background:rgba(0,0,0,.6);display:flex;justify-content:space-between;align-items:center;padding:0 20px;z-index:10}
.hd .t{font-size:.7rem;font-weight:700;color:var(--white);letter-spacing:.5px}
.hd .t span{color:var(--gold);font-weight:400;margin-left:6px;font-size:.65rem}
.hd a{font-size:.6rem;color:rgba(255,255,255,.4);text-decoration:none;transition:color .2s}
.hd a:hover{color:var(--gold)}

.stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:8px}
.book-outer{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.book{position:relative;flex:0 0 auto;flex-shrink:0;transform-origin:center center;transition:transform .1s}
.pg{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:3px;overflow:hidden;backface-visibility:hidden;background:#fff}
.pg iframe{width:1424px;height:1100px;border:none;display:block;transform-origin:0 0;background:#fff;pointer-events:auto}
.pg img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.pg-back{z-index:1;box-shadow:0 2px 15px rgba(0,0,0,.3)}
.pg-front{z-index:2;box-shadow:0 4px 30px rgba(0,0,0,.4),3px 0 10px rgba(0,0,0,.15)}
.book::before{content:'';position:absolute;left:-2px;top:3px;bottom:3px;width:4px;background:linear-gradient(to right,rgba(0,0,0,.3),rgba(0,0,0,.08),transparent);z-index:10;pointer-events:none}
.book::after{content:'';position:absolute;right:-3px;top:4px;bottom:4px;width:6px;z-index:0;pointer-events:none;background:repeating-linear-gradient(to right,rgba(230,225,218,.2) 0,rgba(230,225,218,.1) 1px,transparent 1px,transparent 2px)}

/* Page curl forward */
.pg-front.cf{animation:cf .7s cubic-bezier(.4,0,.2,1) forwards;transform-origin:0 0;z-index:3}
@keyframes cf{
  0%{transform:rotateY(0) rotateX(0);opacity:1}
  12%{transform:rotateY(-6deg) rotateX(2deg) translateZ(6px)}
  35%{transform:rotateY(-45deg) rotateX(6deg) translateZ(16px);box-shadow:-10px 8px 25px rgba(0,0,0,.2)}
  55%{transform:rotateY(-100deg) rotateX(4deg) translateZ(22px)}
  78%{transform:rotateY(-160deg) rotateX(1deg) translateZ(8px)}
  100%{transform:rotateY(-180deg) rotateX(0);opacity:0}
}
/* Page curl backward */
.pg-front.cb{animation:cb .7s cubic-bezier(.4,0,.2,1) forwards;transform-origin:0 0;z-index:3}
@keyframes cb{
  0%{transform:rotateY(-180deg);opacity:0}
  12%{transform:rotateY(-172deg) rotateX(1deg) translateZ(6px);opacity:1}
  35%{transform:rotateY(-135deg) rotateX(4deg) translateZ(16px)}
  55%{transform:rotateY(-80deg) rotateX(6deg) translateZ(22px)}
  78%{transform:rotateY(-15deg) rotateX(2deg) translateZ(8px)}
  100%{transform:rotateY(0) rotateX(0);opacity:1;box-shadow:0 4px 30px rgba(0,0,0,.4)}
}

/* ===== ARROWS ===== */
.nav{
  position:absolute;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:20;
  transition:left .15s,right .15s,top .15s,opacity .2s;
}
.nav .arrow{
  width:38px;height:38px;
  background:rgba(22,22,42,.55);
  border:1px solid rgba(255,255,255,.1);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;
  opacity:.5;
  backdrop-filter:blur(4px);
}
.nav:hover .arrow{
  background:var(--crimson);
  border-color:var(--crimson);
  opacity:1;
  transform:scale(1.12);
  box-shadow:0 2px 12px rgba(171,1,46,.4);
}
.nav:active .arrow{transform:scale(.92);opacity:1}
.nav svg{width:15px;height:15px;color:var(--white)}
.nav.off{pointer-events:none}
.nav.off .arrow{opacity:.06}

/* Bottom bar */
.ft{height:48px;flex-shrink:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;gap:6px;padding:0 16px;z-index:10}
.dots{display:flex;gap:3px;align-items:center}
.d{width:24px;height:16px;border-radius:2px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);cursor:pointer;transition:all .2s;position:relative}
.d:hover{border-color:rgba(255,255,255,.25);transform:scale(1.2)}
.d.on{border-color:var(--crimson);background:var(--crimson);box-shadow:0 0 6px rgba(171,1,46,.4);transform:scale(1.2)}
.d.cv{border-color:rgba(196,163,90,.25);background:rgba(196,163,90,.08)}
.d.cv.on{background:var(--gold);border-color:var(--gold)}
.d .tp{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(10,10,24,.95);color:var(--white);font-size:.5rem;font-weight:600;padding:3px 8px;border-radius:3px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;box-shadow:0 3px 10px rgba(0,0,0,.4)}
.d:hover .tp{opacity:1}
.cnt{font-size:.65rem;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:1px;margin-left:10px}
.cnt b{color:var(--white)}
.fs{width:30px;height:30px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:10px;transition:all .2s}
.fs:hover{background:rgba(255,255,255,.1)}
.fs svg{width:13px;height:13px;color:rgba(255,255,255,.5)}
.hint{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);font-size:.5rem;color:rgba(255,255,255,.15);letter-spacing:1.5px;text-transform:uppercase;pointer-events:none;animation:ho 5s ease forwards;z-index:5}
@keyframes ho{0%,65%{opacity:1}100%{opacity:0}}

/* ===== Rotate-to-landscape overlay ===== */
.rotate-msg{display:none;position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#080816,#12122a 50%,#18102e);flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:32px}
.rotate-msg .r-icon{width:56px;height:56px;animation:rock 2.5s ease-in-out infinite}
@keyframes rock{0%,100%{transform:rotate(0deg)}25%{transform:rotate(90deg)}50%{transform:rotate(90deg)}75%{transform:rotate(0deg)}}
.rotate-msg h2{font-family:var(--font);font-size:1.1rem;font-weight:700;color:var(--white);letter-spacing:.5px}
.rotate-msg p{font-family:var(--font);font-size:.8rem;color:rgba(255,255,255,.5);max-width:280px;line-height:1.5}
.rotate-msg .r-brand{font-size:.6rem;color:var(--gold);letter-spacing:1px;font-weight:700;margin-top:12px}
@media(max-width:768px) and (orientation:portrait){
  .rotate-msg{display:flex}
  .app{display:none}
}
/* ===== Small-screen bottom-bar adjustments ===== */
@media(max-width:600px){
  .ft{height:40px;padding:0 8px;gap:4px}
  .d{width:14px;height:10px}
  .d .tp{display:none}
  .cnt{font-size:.55rem;margin-left:6px}
  .hd{height:32px;padding:0 10px}
  .hd .t{font-size:.6rem}
  .hd .t span{font-size:.55rem}
  .hd a{font-size:.5rem}
  .nav .arrow{width:30px;height:30px}
  .nav svg{width:12px;height:12px}
}
</style>
</head>
<body>
<div class="rotate-msg">
  <svg class="r-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="16" y="4" width="32" height="56" rx="4" stroke="#c4a35a" stroke-width="2.5"/>
    <line x1="28" y1="52" x2="36" y2="52" stroke="#c4a35a" stroke-width="2" stroke-linecap="round"/>
    <path d="M52 20 l6 0 0-6" stroke="#ab012e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M58 20 C56 12 50 8 42 8" stroke="#ab012e" stroke-width="2" stroke-linecap="round" fill="none"/>
  </svg>
  <h2>Rotate Your Device</h2>
  <p>This offering memorandum is best viewed in landscape mode. Please rotate your phone for the full experience.</p>
  <div class="r-brand">MASON CAPITAL GROUP</div>
</div>
<div class="app" id="app">
  <div class="hd">
    <div class="t">OFFERING MEMORANDUM <span>The Enclave at Beaver Lake · Rogers, AR</span></div>
    <a href="https://www.masoncapitalgroup.com" target="_blank" rel="noopener noreferrer">masoncapitalgroup.com</a>
  </div>
  <div class="stage" id="stage">
    <div class="book-outer">
      <div class="book" id="book">
        <div class="pg pg-back" id="pgB"></div>
        <div class="pg pg-front" id="pgF"></div>
      </div>
      <div class="nav L" id="pB" onclick="goPrev()"><div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></div></div>
      <div class="nav R" id="nB" onclick="goNext()"><div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div></div>
    </div>
  </div>
  <div class="hint">← → Arrow keys · Swipe · F = fullscreen</div>
  <div class="ft">
    <div class="dots" id="dots"></div>
    <div class="cnt"><b id="cN">1</b>/<span id="tN">11</span></div>
    <div class="fs" onclick="togFS()" title="Fullscreen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></div>
  </div>
</div>
<script>
const PAGES=[
  {t:'Cover',src:'pages/page1_cover.html',cv:true},
  {t:'The Vision',src:'pages/page2_vision.html'},
  {t:'The Architecture',src:'pages/page3_architecture.html'},
  {t:'Property Overview',src:'pages/page5_overview.html'},
  {t:'The Setting',src:'pages/page4_setting.html'},
  {t:'Site Plan & Lots',src:'pages/page6_siteplan.html'},
  {t:'Amenities & Lake Life',src:'pages/page7_amenities.html'},
  {t:'Beaver Lake',src:'pages/page9_concept.html'},
  {t:'NWA Market',src:'pages/page8_market.html'},
  {t:'Location & Access',src:'pages/page10_regional.html'},
  {t:'Contact',src:'pages/page11_contact.html'}
];
const PW=1424,PH=1100;
let ci=0,busy=false;
const book=document.getElementById('book'),pgF=document.getElementById('pgF'),pgB=document.getElementById('pgB');
const cN=document.getElementById('cN'),tN=document.getElementById('tN');
const pB=document.getElementById('pB'),nB=document.getElementById('nB'),stage=document.getElementById('stage');
tN.textContent=PAGES.length;
const dotsEl=document.getElementById('dots');
PAGES.forEach((p,i)=>{const d=document.createElement('div');d.className='d'+(i===0?' on':'')+(p.cv?' cv':'');d.innerHTML=`<div class="tp">${p.t}</div>`;d.onclick=()=>goTo(i);dotsEl.appendChild(d);});

function renderPage(container,page){
  container.innerHTML='';
  if(!page)return;
  if(page.type==='image'){
    const img=document.createElement('img');img.src=page.src;img.alt=page.t;img.draggable=false;
    container.appendChild(img);
  }else{
    const ifr=document.createElement('iframe');ifr.src=page.src;ifr.title=page.t;
    ifr.style.cssText='width:'+PW+'px;height:'+PH+'px;border:none;display:block;transform-origin:0 0;background:#fff;pointer-events:auto';
    container.appendChild(ifr);
  }
}

function resize(){
  const sw=stage.clientWidth-16,sh=stage.clientHeight-16;
  const s=Math.min(sw/PW,sh/PH,1);
  book.style.width=PW+'px';book.style.height=PH+'px';book.style.transform=`scale(${s})`;
  const bw=PW*s, bh=PH*s;
  const gapX=(stage.clientWidth-bw)/2;
  const centerY=(stage.clientHeight-bh)/2+bh/2-20;
  const arrowInGap=Math.max(6,Math.floor((gapX-40)/2));
  pB.style.left=arrowInGap+'px'; pB.style.top=centerY+'px';
  nB.style.right=arrowInGap+'px'; nB.style.top=centerY+'px';
}
window.addEventListener('resize',resize);resize();
// Recompute scale whenever the stage box actually changes size (covers nested-iframe/embedded sizing)
try{ new ResizeObserver(function(){ resize(); }).observe(stage); }catch(e){}
window.addEventListener('load',resize);
setTimeout(resize,300);setTimeout(resize,1000);
renderPage(pgF,PAGES[0]);ui(0);

function ui(i){cN.textContent=i+1;document.querySelectorAll('.d').forEach((d,j)=>d.classList.toggle('on',j===i));pB.classList.toggle('off',i===0);nB.classList.toggle('off',i===PAGES.length-1);}
function goNext(){if(ci>=PAGES.length-1||busy)return;busy=true;renderPage(pgB,PAGES[ci+1]);pgF.classList.add('cf');setTimeout(()=>{pgF.classList.remove('cf');pgF.style.transform='';pgF.style.opacity='';renderPage(pgF,PAGES[ci+1]);ci++;ui(ci);busy=false;},700);}
function goPrev(){if(ci<=0||busy)return;busy=true;renderPage(pgB,PAGES[ci]);renderPage(pgF,PAGES[ci-1]);pgF.style.transform='rotateY(-180deg)';pgF.style.opacity='0';void pgF.offsetWidth;pgF.classList.add('cb');setTimeout(()=>{pgF.classList.remove('cb');pgF.style.transform='';pgF.style.opacity='';ci--;ui(ci);busy=false;},700);}
function goTo(t){if(t===ci||busy)return;const fwd=t>ci;busy=true;if(fwd){renderPage(pgB,PAGES[t]);pgF.classList.add('cf');}else{renderPage(pgB,PAGES[ci]);renderPage(pgF,PAGES[t]);pgF.style.transform='rotateY(-180deg)';pgF.style.opacity='0';void pgF.offsetWidth;pgF.classList.add('cb');}setTimeout(()=>{pgF.classList.remove('cf','cb');pgF.style.transform='';pgF.style.opacity='';renderPage(pgF,PAGES[t]);ci=t;ui(ci);busy=false;},700);}
function togFS(){if(!document.fullscreenElement)document.getElementById('app').requestFullscreen().catch(()=>{});else document.exitFullscreen();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goNext();}if(e.key==='ArrowLeft'){e.preventDefault();goPrev();}if(e.key==='f'||e.key==='F')togFS();if(e.key==='Home')goTo(0);if(e.key==='End')goTo(PAGES.length-1);});
let tx=0;document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});document.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].screenX;if(Math.abs(d)>50){d>0?goNext():goPrev();}},{passive:true});
document.addEventListener('fullscreenchange',()=>setTimeout(resize,100));
</script>
</body>
</html>
